        ]]></style></defs><g id="bodice-back" transform="translate(50, 50)"><path class="pattern-outline" d="M 0,0 L 65.0,0 L 256.6,25.0 Q 245.0,230.0 235.0,270.0 L 0,270.0 Z" /><text class="text-label" x="100" y="-10">BACK</text><text class="text-small" x="100" y="-25">Cut 2 on fold</text><line class="grainline" x1="50" x2="50" y1="100" y2="350" /><text class="text-small" transform="rotate(-90, 60, 220)" x="60" y="220">GRAIN</text></g><g id="bodice-front" transform="translate(300, 50)"><path class="pattern-outline" d="M 0,70 L 65.0,10 L 256.6,35.0 Q 245.0,230.0 235.0,270.0 L 0,270.0 Z" /><text class="text-label" x="100" y="-10">FRONT</text><text class="text-small" x="100" y="-25">Cut 2 on fold</text><line class="grainline" x1="50" x2="50" y1="100" y2="350" /></g><g id="pattern-info" transform="translate(50, 20)"><text class="text-small" style="fill: #666;" x="0" y="0">Pattern: SLEEVELESS SLEEVE | Neckline: V-NECK</text></g></svg>