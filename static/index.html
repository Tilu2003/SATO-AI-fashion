<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATO AI Tailor | Custom Patterns</title>
    <style>
        :root { --primary: #ea580c; --bg: #fef6e9; --bot-msg: #fffbf0; --user-msg: #fed7aa; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; height: 100vh; }
        #app { width: 100%; max-width: 750px; background: white; display: flex; flex-direction: column; border-right: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; }
        
        header { padding: 1rem; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .stage-badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 12px; background: #fed7aa; color: #9a3412; font-weight: 600; text-transform: uppercase; }

        #chat-window { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .msg { max-width: 85%; padding: 0.8rem 1rem; border-radius: 1rem; line-height: 1.5; font-size: 0.95rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .bot { align-self: flex-start; background: var(--bot-msg); border: 1px solid #e2e8f0; }
        .user { align-self: flex-end; background: var(--primary); color: white; }
        
        .form-overlay { border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 1rem; margin-top: 0.5rem; background: #fdfdfd; }
        .form-field { margin-bottom: 0.75rem; }
        .form-field label { display: block; font-size: 0.8rem; font-weight: 600; color: #64748b; margin-bottom: 4px; }
        .form-field input { width: 100%; padding: 0.5rem; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; }
        .form-field input.error { border-color: #ef4444; }
        .error-text { color: #ef4444; font-size: 0.75rem; margin-top: 2px; }
        
        .controls { padding: 1rem; border-top: 1px solid #e2e8f0; display: flex; gap: 0.5rem; align-items: center; }
        input[type="text"] { flex: 1; padding: 0.6rem 1rem; border: 1px solid #cbd5e1; border-radius: 999px; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 999px; cursor: pointer; font-weight: 500; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .btn-icon { background: #f1f5f9; color: #475569; padding: 0.6rem; }
        
        .tutorial-link { display: block; color: var(--primary); font-size: 0.85rem; margin-top: 4px; text-decoration: none; }
        
        /* Download Section Styles */
        .download-section { margin-top: 1rem; padding: 1rem; background: #fef6e9; border: 1px solid #fdba74; border-radius: 8px; }
        .download-section h4 { margin: 0 0 0.75rem 0; font-size: 0.9rem; color: #9a3412; }
        .download-btn { display: inline-flex; align-items: center; gap: 0.5rem; background: #ea580c; color: white; padding: 0.6rem 1.2rem; border-radius: 6px; text-decoration: none; margin: 0.25rem; font-weight: 600; font-size: 0.9rem; transition: background 0.2s; }
        .download-btn:hover { background: #c2410c; }
        .download-btn.secondary { background: #f97316; }
        .download-btn.secondary:hover { background: #ea580c; }
        .download-icon { font-size: 1.1rem; }
        
        .loading { opacity: 0.6; pointer-events: none; }
        .status-indicator { position: absolute; top: 1rem; right: 1rem; width: 8px; height: 8px; border-radius: 50%; background: #ea580c; }
        .status-indicator.offline { background: #ef4444; }
        .error-banner { background: #fee2e2; border: 1px solid #ef4444; color: #991b1b; padding: 0.75rem; border-radius: 6px; margin: 0.5rem 0; font-size: 0.9rem; }
        
        /* Typing Indicator */
        .typing-indicator { display: flex; align-items: center; gap: 0.5rem; padding: 1rem; background: var(--bot-msg); border: 1px solid #e2e8f0; border-radius: 1rem; max-width: 85%; align-self: flex-start; }
        .typing-dots { display: flex; gap: 4px; }
        .typing-dots span { width: 8px; height: 8px; background: #64748b; border-radius: 50%; animation: typing 1.4s infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
        
        /* Progress Bar */
        .progress-bar { width: 100%; height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; margin-top: 0.5rem; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ea580c, #f97316); animation: progress 2s ease-in-out infinite; }
        @keyframes progress { 0% { width: 0%; } 50% { width: 70%; } 100% { width: 100%; } }
        
        /* SVG Viewer Controls */
        .svg-btn {
            background: #ea580c;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
        }
        .svg-btn:hover {
            background: #c2410c;
            transform: translateY(-1px);
        }
        .svg-viewer-container svg {
            max-width: 100%;
            height: auto;
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <strong>SATO AI Tailor</strong>
        <span id="stage-display" class="stage-badge">Upload</span>
        <div id="status-indicator" class="status-indicator" title="Connected"></div>
    </header>

    <div id="chat-window">
        <div class="msg bot">
            <strong>👋 Hi! I'm SATO, your AI pattern designer.</strong><br><br>
            Upload a garment photo and I'll create a custom sewing pattern for you!<br><br>
            Click 📷 below to get started.
        </div>
    </div>

    <div class="controls">
        <input type="file" id="file-input" hidden accept="image/*">
        <button class="btn-icon" onclick="document.getElementById('file-input').click()">📷</button>
        <input type="text" id="user-input" placeholder="Type a message...">
        <button id="send-btn" onclick="handleSend()">Send</button>
    </div>
</div>

<script>
    let sessionId = null;
    let currentImagePath = null;
    let currentStage = "UPLOAD";
    let isProcessing = false;
    let backendHealthy = false;

    const chatWin = document.getElementById('chat-window');
    const sendBtn = document.getElementById('send-btn');
    const userInput = document.getElementById('user-input');
    const statusIndicator = document.getElementById('status-indicator');

    // Check backend health on load
    async function checkBackendHealth() {
        try {
            const response = await fetch('/health');
            if (response.ok) {
                const data = await response.json();
                backendHealthy = data.status === 'healthy';
                statusIndicator.classList.toggle('offline', !backendHealthy);
                statusIndicator.title = backendHealthy ? 'Connected' : 'Disconnected';
                
                if (backendHealthy) {
                    console.log('✅ Backend healthy');
                }
            } else {
                backendHealthy = false;
                statusIndicator.classList.add('offline');
            }
        } catch (err) {
            console.error('Health check failed:', err);
            backendHealthy = false;
            statusIndicator.classList.add('offline');
        }
    }

    // Create session on load
    async function initializeSession() {
        try {
            const response = await fetch('/session/new', { method: 'POST' });
            if (response.ok) {
                const data = await response.json();
                sessionId = data.session_id;
                console.log('✅ Session created:', sessionId.substring(0, 20) + '...');
            }
        } catch (err) {
            console.error('Failed to create session:', err);
            appendMessage("⚠️ Could not connect to server. Please refresh the page.", 'bot');
        }
    }

    // Initialize on page load
    window.addEventListener('load', async () => {
        await checkBackendHealth();
        if (backendHealthy) {
            await initializeSession();
        }
    });

    async function handleSend() {
        if (isProcessing) return;
        
        const text = userInput.value.trim();
        if (!text && !currentImagePath) return;

        if (!backendHealthy) {
            appendMessage("❌ Backend not available. Please check the server.", 'bot');
            return;
        }

        if (!sessionId) {
            showTypingIndicator();
            await sleep(500);
            hideTypingIndicator();
            appendMessage("⚠️ Creating a new session...", 'bot');
            await initializeSession();
            if (!sessionId) {
                appendMessage("❌ Could not create session. Please refresh the page.", 'bot');
                return;
            }
        }

        if (text) {
            appendMessage(text, 'user');
            userInput.value = '';
            isProcessing = true;
            sendBtn.disabled = true;

            // Show typing indicator
            showTypingIndicator();
            await sleep(400);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: text,
                        image_path: currentImagePath
                    })
                });

                hideTypingIndicator();

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.error) {
                    appendMessage(`❌ ${data.error}`, 'bot');
                    return;
                }

                sessionId = data.session_id;
                
                // Small delay before showing response for natural feel
                await sleep(200);
                updateUI(data);

            } catch (err) {
                console.error('Chat error:', err);
                hideTypingIndicator();
                appendMessage("❌ Something went wrong. Please try again.", 'bot');
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
            }
        }
    }

    function updateUI(data) {
        if (data.message) {
            appendMessage(data.message.replace(/\n/g, '<br>'), 'bot');
        }
        
        if (data.stage) {
            currentStage = data.stage;
            document.getElementById('stage-display').innerText = data.stage;
        }

        // Handle Dynamic Measurement Form
        if (data.form && data.form.form_fields) {
            renderMeasurementForm(data.form);
        }

        // Handle Pattern Download with Inline SVG Viewer
        if (data.file_link) {
            appendMessage('🎨 <strong>Your Pattern is Ready!</strong> Loading preview...', 'bot');
            loadSVGPattern(data.file_link);
        }
    }

    async function loadSVGPattern(svgUrl) {
        try {
            const response = await fetch(svgUrl);
            const svgText = await response.text();
            
            const viewerHtml = `
                <div class="svg-viewer-container" style="background: white; border-radius: 12px; padding: 1rem; margin: 0.5rem 0;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 2px solid #fed7aa;">
                        <div>
                            <h4 style="margin: 0; color: #ea580c;">📐 Your Sewing Pattern</h4>
                            <span style="font-size: 0.75rem; color: #9a3412; font-weight: 600;">✨ Vector Format (SVG) - Infinitely Scalable</span>
                        </div>
                        <div style="display: flex; gap: 0.5rem;">
                            <button onclick="zoomSVG(0.8)" class="svg-btn" title="Zoom Out">🔍-</button>
                            <button onclick="zoomSVG(1.2)" class="svg-btn" title="Zoom In">🔍+</button>
                            <button onclick="resetSVGZoom()" class="svg-btn" title="Reset View">🔄</button>
                            <a href="${svgUrl}" download class="svg-btn" style="text-decoration: none;" title="Download SVG">📥</a>
                        </div>
                    </div>
                    <div id="svg-viewer" style="
                        max-height: 500px;
                        overflow: auto;
                        border: 2px solid #fed7aa;
                        border-radius: 8px;
                        background: #fffbf0;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        padding: 1rem;
                    ">
                        ${svgText}
                    </div>
                    <div style="margin-top: 0.75rem; padding: 0.75rem; background: #fef6e9; border-radius: 8px; font-size: 0.85rem;">
                        <strong>� What's Included in Your Pattern:</strong><br>
                        <div style="margin: 0.5rem 0; padding-left: 0.5rem; border-left: 3px solid #ea580c;">
                            ✂️ <strong>Cutting Lines:</strong> Outer edges (includes 10mm seam allowance)<br>
                            🧵 <strong>Sewing Lines:</strong> Inner lines showing where to stitch<br>
                            📍 <strong>Notches:</strong> Alignment marks for matching pieces<br>
                            ↕️ <strong>Grainlines:</strong> Fabric direction indicators<br>
                            🏷️ <strong>Labels:</strong> Pattern piece names and info<br>
                            📏 <strong>Seam Allowance:</strong> 10mm (⅜") included on all edges
                        </div>
                        <strong style="color: #ea580c;">📊 Vector Format Benefits:</strong><br>
                        ✨ Scale to any size • ✏️ Edit all lines • 🖨️ Print-ready<br>
                        🎨 <strong>Edit with:</strong> Inkscape (free), Adobe Illustrator, CorelDRAW
                    </div>
                </div>
            `;
            
            appendMessage(viewerHtml, 'bot');
            
            // Store current scale for zoom
            window.svgScale = 1.0;
            
        } catch (error) {
            console.error('SVG load error:', error);
            appendMessage(`❌ Failed to load pattern preview. <a href="${svgUrl}" download>Download SVG</a>`, 'bot');
        }
    }
    
    function zoomSVG(factor) {
        const viewer = document.getElementById('svg-viewer');
        const svg = viewer.querySelector('svg');
        if (svg) {
            window.svgScale = (window.svgScale || 1.0) * factor;
            svg.style.transform = `scale(${window.svgScale})`;
            svg.style.transformOrigin = 'center';
        }
    }
    
    function resetSVGZoom() {
        const viewer = document.getElementById('svg-viewer');
        const svg = viewer.querySelector('svg');
        if (svg) {
            window.svgScale = 1.0;
            svg.style.transform = 'scale(1)';
        }
    }

    function renderMeasurementForm(formData) {
        const formDiv = document.createElement('div');
        formDiv.className = 'msg bot form-overlay';
        formDiv.id = 'measurement-form';
        
        let html = `<strong>📏 Please provide measurements (cm):</strong><br><br>`;
        
        formData.form_fields.forEach(field => {
            const hasError = formData.errors && formData.errors.some(e => e.includes(field.name));
            const submittedValue = formData.submitted_values ? formData.submitted_values[field.key] || '' : '';
            
            html += `
                <div class="form-field">
                    <label title="${field.description}">${field.name} (${field.key})</label>
                    <input type="number" 
                           step="0.1" 
                           class="m-input ${hasError ? 'error' : ''}" 
                           data-key="${field.key}" 
                           value="${submittedValue}"
                           placeholder="Range: ${field.typical_range[0]}-${field.typical_range[1]} cm"
                           required="${field.required}">
                </div>`;
        });
        
        if (formData.errors) {
            html += '<div class="error-text"><strong>Errors:</strong><br>';
            formData.errors.forEach(err => html += `• ${err}<br>`);
            html += '</div><br>';
        }
        
        if (formData.warnings) {
            html += '<div style="color: #f59e0b; font-size: 0.85rem;"><strong>⚠️ Warnings:</strong><br>';
            formData.warnings.forEach(warn => html += `• ${warn}<br>`);
            html += '</div><br>';
        }
        
        html += `<button onclick="submitMeasurements(this)" id="submit-measurements-btn">Submit Measurements</button>`;
        formDiv.innerHTML = html;
        
        // Remove old form if exists
        const oldForm = document.getElementById('measurement-form');
        if (oldForm) oldForm.remove();
        
        chatWin.appendChild(formDiv);
        scrollToBottom();
    }

    async function submitMeasurements(btn) {
        const inputs = btn.parentElement.querySelectorAll('.m-input');
        let measurements = {};
        let hasEmpty = false;
        
        // Collect measurements and check for empty required fields
        inputs.forEach(input => {
            const value = input.value.trim();
            if (value === '' && input.required) {
                hasEmpty = true;
                input.classList.add('error');
            } else {
                input.classList.remove('error');
                if (value !== '') {
                    measurements[input.dataset.key] = parseFloat(value);
                }
            }
        });
        
        if (hasEmpty) {
            appendMessage("⚠️ Please fill in all required measurements.", 'bot');
            return;
        }
        
        // Disable form
        btn.disabled = true;
        btn.textContent = 'Submitting...';
        inputs.forEach(i => i.disabled = true);
        
        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    session_id: sessionId,
                    message: JSON.stringify(measurements),
                    image_path: currentImagePath
                })
            });

            if (!response.ok) {
                throw new Error(`Server error: ${response.status}`);
            }

            const data = await response.json();
            
            if (data.error && data.requires_new_session) {
                await initializeSession();
                appendMessage("⚠️ Session expired. Please resubmit.", 'bot');
                btn.disabled = false;
                btn.textContent = 'Submit Measurements';
                inputs.forEach(i => i.disabled = false);
            } else {
                updateUI(data);
            }
        } catch (err) {
            console.error('Measurement submission error:', err);
            appendMessage("❌ Error submitting measurements. Please try again.", 'bot');
            btn.disabled = false;
            btn.textContent = 'Submit Measurements';
            inputs.forEach(i => i.disabled = false);
        }
    }

    function appendMessage(content, role) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = content;
        chatWin.appendChild(div);
        scrollToBottom();
    }
    
    function showTypingIndicator() {
        const typing = document.createElement('div');
        typing.className = 'typing-indicator';
        typing.id = 'typing-indicator';
        typing.innerHTML = `
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <span style="color: #64748b; font-size: 0.9rem;">SATO is thinking...</span>
        `;
        chatWin.appendChild(typing);
        scrollToBottom();
    }
    
    function hideTypingIndicator() {
        const typing = document.getElementById('typing-indicator');
        if (typing) typing.remove();
    }
    
    function showProgress(message) {
        const progressDiv = document.createElement('div');
        progressDiv.className = 'msg bot';
        progressDiv.id = 'progress-message';
        progressDiv.innerHTML = `
            <span id="progress-text">${message}</span>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        `;
        chatWin.appendChild(progressDiv);
        scrollToBottom();
        return progressDiv.querySelector('#progress-text');
    }
    
    function hideProgress() {
        const progress = document.getElementById('progress-message');
        if (progress) progress.remove();
    }

    function scrollToBottom() {
        chatWin.scrollTop = chatWin.scrollHeight;
    }

    // Image Upload Handling
    document.getElementById('file-input').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Check file type
        if (!file.type.startsWith('image/')) {
            appendMessage("❌ Hmm, that doesn't look like an image file. Please upload a JPG, PNG, or similar image format.", 'bot');
            return;
        }

        // Check file size (max 10MB)
        if (file.size > 10 * 1024 * 1024) {
            appendMessage("❌ This image is too large (over 10MB). Could you try a smaller version?", 'bot');
            return;
        }

        const formData = new FormData();
        formData.append('file', file);

        appendMessage("📤 Got it! Uploading your image...", 'bot');
        sendBtn.disabled = true;
        
        showProgress('⬆️ Uploading image to server...');

        try {
            const res = await fetch('/upload', { method: 'POST', body: formData });
            
            hideProgress();
            
            if (!res.ok) {
                throw new Error(`Upload failed: ${res.status}`);
            }
            
            const data = await res.json();
            
            if (data.error) {
                appendMessage(`❌ Upload failed: ${data.error}`, 'bot');
                return;
            }
            
            currentImagePath = data.image_path;
            sessionId = data.session_id;
            
            // Show success and start analysis
            appendMessage("✅ Perfect! Image uploaded successfully.", 'bot');
            
            // Small delay for natural conversation flow
            await sleep(300);
            
            // Automatically process the image (description is optional)
            await processImageAnalysis("");
            
        } catch (err) {
            console.error('Upload error:', err);
            hideProgress();
            appendMessage("❌ Oops! Something went wrong with the upload.", 'bot');
            appendMessage("💡 <strong>Troubleshooting tips:</strong><br>• Make sure the server is running<br>• Check your internet connection<br>• Try a different image", 'bot');
            statusIndicator.classList.add('offline');
            backendHealthy = false;
        } finally {
            sendBtn.disabled = false;
        }
    };

    // Process image analysis (can be called with or without description)
    async function processImageAnalysis(description) {
        if (!currentImagePath || !sessionId) return;
        
        isProcessing = true;
        sendBtn.disabled = true;
        
        // Show progress with live updates
        const progressMsg = showProgress('🔍 Analyzing image with Gemini AI...');
        
        // Milestone 1: After 3 seconds
        const milestone1 = setTimeout(() => {
            if (progressMsg && progressMsg.parentElement) {
                progressMsg.textContent = '🧠 Identifying garment features...';
            }
        }, 3000);
        
        // Milestone 2: After 7 seconds
        const milestone2 = setTimeout(() => {
            if (progressMsg && progressMsg.parentElement) {
                progressMsg.textContent = '🧵 Analyzing construction details...';
            }
        }, 7000);
        
        // Milestone 3: After 12 seconds
        const milestone3 = setTimeout(() => {
            if (progressMsg && progressMsg.parentElement) {
                progressMsg.textContent = '✨ Finalizing analysis...';
            }
        }, 12000);
        
        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    session_id: sessionId,
                    message: description,
                    image_path: currentImagePath
                })
            });
            
            // Clear milestone timeouts
            clearTimeout(milestone1);
            clearTimeout(milestone2);
            clearTimeout(milestone3);
            
            hideProgress();
            
            if (!response.ok) {
                throw new Error(`Server error: ${response.status}`);
            }
            
            const data = await response.json();
            
            if (data.error) {
                appendMessage(`❌ Error: ${data.error}`, 'bot');
                appendMessage("💡 Tip: Try uploading a clearer image or describe the garment manually.", 'bot');
                return;
            }
            
            sessionId = data.session_id;
            
            // Show brief typing before displaying results
            showTypingIndicator();
            await sleep(300);
            hideTypingIndicator();
            
            updateUI(data);
            
        } catch (err) {
            console.error('Analysis error:', err);
            hideProgress();
            hideTypingIndicator();
            
            // Show specific error message based on error type
            const errorStr = err.toString().toLowerCase();
            if (errorStr.includes('timeout') || errorStr.includes('503') || errorStr.includes('connect')) {
                appendMessage("⏱️ **Analysis timeout.** The AI service is taking too long to respond.", 'bot');
                appendMessage("💡 **Tips:** Check your internet connection, try a smaller image, or try again in a moment.", 'bot');
            } else {
                appendMessage("❌ Analysis failed. The AI service might be temporarily unavailable.", 'bot');
                appendMessage("🔄 Please try again or check your internet connection.", 'bot');
            }
        } finally {
            isProcessing = false;
            sendBtn.disabled = false;
        }
    }
    
    // Helper function for delays
    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    // Allow Enter key to send message
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    });
</script>
</body>
</html>
