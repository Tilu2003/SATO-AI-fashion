<svg baseProfile="full" height="900mm" version="1.1" viewBox="0,0,700,900" width="700mm" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><style type="text/css"><![CDATA[
            .pattern-outline { fill: none; stroke: black; stroke-width: 2; }
            .pattern-inner { fill: none; stroke: blue; stroke-width: 1; stroke-dasharray: 5,5; }
            .grainline { stroke: black; stroke-width: 1; }
            .text-label { font-family: Arial; font-size: 14px; text-anchor: middle; }
            .text-small { font-family: Arial; font-size: 10px; }
            .notch { fill: black; stroke: black; stroke-width: 1; }
        ]]></style></defs><g id="bodice-back" transform="translate(50, 50)"><path class="pattern-outline" d="M 0,0 L 65.0,0 L 255.0,25.0 Q 245.0,230.0 235.0,420 L 0,420 Z" /><text class="text-label" x="100" y="-10">BACK</text><text class="text-small" x="100" y="-25">Cut 2 on fold</text><line class="grainline" x1="50" x2="50" y1="100" y2="350" /><text class="text-small" transform="rotate(-90, 60, 220)" x="60" y="220">GRAIN</text></g><g id="bodice-front" transform="translate(300, 50)"><path class="pattern-outline" d="M 0,70 L 65.0,10 L 255.0,35.0 Q 245.0,230.0 235.0,420 L 0,420 Z" /><text class="text-label" x="100" y="-10">FRONT</text><text class="text-small" x="100" y="-25">Cut 2 on fold</text><line class="grainline" x1="50" x2="50" y1="100" y2="350" /></g><g id="sleeve" transform="translate(550, 50)"><path class="pattern-outline" d="M 0,0 Q 145.0,20 175.0,60.666666666666664 L 95.0,600 L -95.0,600 L -175.0,60.666666666666664 Q -145.0,20 0,0 Z" /><text class="text-label" x="0" y="-10">LONG SLEEVE</text><text class="text-small" x="0" y="-25">Cut 2</text></g><g id="skirt" transform="translate(50, 500)"><path class="pattern-outline" d="M 0,0 L 190.0,0 L 255.0,200 L 331.5,600 L 0,600 Z" /><text class="text-label" x="100" y="-10">A-LINE SKIRT</text><text class="text-small" x="100" y="-25">Cut 2</text></g><g id="collar" transform="translate(550, 200)"><path class="pattern-outline" d="M 0,0 L 190.0,0 L 190.0,70 L 0,70 Z" /><text class="text-label" x="50" y="-10">STANDARD COLLAR</text><text class="text-small" x="50" y="-25">Cut 2</text></g><g id="pattern-info" transform="translate(50, 20)"><text class="text-small" style="fill: #666;" x="0" y="0">Pattern: LONG SLEEVE | Neckline: V-NECK | Skirt: A-LINE | Collar: STANDARD</text></g></svg>