<svg baseProfile="full" height="900mm" version="1.1" viewBox="0,0,700,900" width="700mm" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><style type="text/css"><![CDATA[
            .pattern-outline { fill: none; stroke: black; stroke-width: 2; }
            .pattern-inner { fill: none; stroke: blue; stroke-width: 1; stroke-dasharray: 5,5; }
            .grainline { stroke: black; stroke-width: 1; }
            .text-label { font-family: Arial; font-size: 14px; text-anchor: middle; }
            .text-small { font-family: Arial; font-size: 10px; }
            .notch { fill: black; stroke: black; stroke-width: 1; }
        ]]></style></defs><g id="bodice-back" transform="translate(50, 50)"><path class="pattern-outline" d="M 0,0 Q 65.0,-5 65.0,0 L 210.0,35.0 Q 215.0,75.0 235.0,150.0 L 220.0,420 L 225.0,620 L 0,620 L 0,420 Z" /><text class="text-label" x="100" y="-10">BACK</text><text class="text-small" x="100" y="-25">Cut 2 on fold</text><line class="grainline" x1="50" x2="50" y1="100" y2="350" /><text class="text-small" transform="rotate(-90, 60, 220)" x="60" y="220">GRAIN</text></g><g id="bodice-front" transform="translate(300, 50)"><path class="pattern-outline" d="M 0,110 L 65.0,0 L 210.0,55.0 Q 220.0,90.0 235.0,160.0 L 215.0,440 L 230.0,640 L 0,640 L 0,480 Z" /><text class="text-label" x="100" y="-10">FRONT</text><text class="text-small" x="100" y="-25">Cut 2 on fold</text><line class="grainline" x1="50" x2="50" y1="100" y2="350" /></g><g id="sleeve" transform="translate(550, 50)"><path class="pattern-outline" d="M 0,0 Q 160.0,20 190.0,110.5 L 105.0,600 L -105.0,600 L -190.0,110.5 Q -160.0,20 0,0 Z" /><polygon fill="black" points="133.0,44.20000000000001 128.0,34.20000000000001 138.0,34.20000000000001" /><polygon fill="black" points="-138.0,44.20000000000001 -143.0,34.20000000000001 -133.0,34.20000000000001" /><polygon fill="black" points="-128.0,44.20000000000001 -133.0,34.20000000000001 -123.0,34.20000000000001" /><text class="text-label" x="0" y="-10">LONG SLEEVE</text><text class="text-small" x="0" y="-25">Cut 2</text></g><g id="pattern-info" transform="translate(50, 20)"><text class="text-small" style="fill: #666;" x="0" y="0">Pattern: LONG SLEEVE | Neckline: V-NECK</text></g><g id="cutting-instructions" transform="translate(600, 50)"><rect fill="#f9f9f9" height="300" stroke="#333" stroke-width="1" width="380" x="0" y="0" /><text style="font-weight: bold; font-size: 14px; fill: #000;" x="10" y="20">CUTTING INSTRUCTIONS</text><text style="font-size: 11px; fill: #333;" x="10" y="40">FABRIC REQUIREMENTS:</text><text style="font-size: 11px; fill: #333;" x="10" y="58">  • Main fabric: 1.5m (150cm wide) or 2m (110cm wide)</text><text style="font-size: 11px; fill: #333;" x="10" y="76">  • Interfacing: 0.5m light to medium weight</text><text style="font-size: 11px; fill: #333;" x="10" y="94" /><text style="font-size: 11px; fill: #333;" x="10" y="112">CUTTING LAYOUT:</text><text style="font-size: 11px; fill: #333;" x="10" y="130">  • Bodice Back: Cut 2 (or 1 on fold)</text><text style="font-size: 11px; fill: #333;" x="10" y="148">  • Bodice Front: Cut 2 (or 1 on fold)</text><text style="font-size: 11px; fill: #333;" x="10" y="166">  • Seam allowance: 1cm included in pattern</text><text style="font-size: 11px; fill: #333;" x="10" y="184" /><text style="font-size: 11px; fill: #333;" x="10" y="202">NOTCHES:</text><text style="font-size: 11px; fill: #333;" x="10" y="220">  ○ Single notch = Front armhole</text><text style="font-size: 11px; fill: #333;" x="10" y="238">  ○○ Double notch = Back armhole</text><text style="font-size: 11px; fill: #333;" x="10" y="256">  • Match notches when sewing</text></g><g id="sewing-instructions" transform="translate(600, 380)"><rect fill="#f0f8ff" height="350" stroke="#333" stroke-width="1" width="380" x="0" y="0" /><text style="font-weight: bold; font-size: 14px; fill: #000;" x="10" y="20">SEWING INSTRUCTIONS</text><text style="font-size: 10px; fill: #333;" x="10" y="40">1. PREPARE: Interface front and back neck</text><text style="font-size: 10px; fill: #333;" x="10" y="56">facings</text><text style="font-size: 10px; fill: #333;" x="10" y="72">2. DARTS: Sew bust darts and back shoulder</text><text style="font-size: 10px; fill: #333;" x="10" y="88">darts</text><text style="font-size: 10px; fill: #333;" x="10" y="104">3. SHOULDERS: Pin and sew shoulder seams</text><text style="font-size: 10px; fill: #333;" x="10" y="120">(right sides together)</text><text style="font-size: 10px; fill: #333;" x="10" y="136">4. SIDES: Pin and sew side seams from armhole</text><text style="font-size: 10px; fill: #333;" x="10" y="152">to hem</text><text style="font-size: 10px; fill: #333;" x="10" y="168">5. FINISH: Apply neck facing and armhole</text><text style="font-size: 10px; fill: #333;" x="10" y="184">binding</text><text style="font-size: 10px; fill: #333;" x="10" y="200">6. HEM: Turn up hem 2cm and topstitch</text></g><text style="font-weight: bold; font-size: 12px; fill: #d00;" x="50" y="45">SEAM ALLOWANCE: 1.0cm INCLUDED</text></svg>